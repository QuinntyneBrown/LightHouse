services:
  postgres:
    image: postgres:16-alpine
    container_name: lighthouse-postgres
    environment:
      POSTGRES_DB: lighthouse
      POSTGRES_USER: lighthouse
      POSTGRES_PASSWORD: lighthouse_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lighthouse"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: lighthouse-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/lighthouse
      KC_DB_USERNAME: lighthouse
      KC_DB_PASSWORD: lighthouse_dev
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: lighthouse-minio
    environment:
      MINIO_ROOT_USER: lighthouse
      MINIO_ROOT_PASSWORD: lighthouse_dev
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: lighthouse-meilisearch
    environment:
      MEILI_MASTER_KEY: lighthouse_dev_key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

volumes:
  postgres_data:
  minio_data:
  meilisearch_data:
